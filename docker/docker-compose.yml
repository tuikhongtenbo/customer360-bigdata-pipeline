services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5

  airflow-init:
    build:
      context: ..
      dockerfile: docker/Dockerfile.airflow
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW_UID: "1000"
      _AIRFLOW_DB_MIGRATE: "true"
    command: >
      bash -c "airflow db init && airflow users create
      --username admin --password admin --firstname Admin --lastname User
      --role Admin --email admin@customer360.local || true"

  airflow-webserver:
    build:
      context: ..
      dockerfile: docker/Dockerfile.airflow
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__WEBSERVER__SECRET_KEY: dev_secret_key
      AIRFLOW__WEBSERVER__RBAC: "True"
      AIRFLOW_UID: "50000"
      _PIP_ADDITIONAL_REQUIREMENTS: "pyspark==3.5.0 findspark psycopg2-binary azure-storage-blob python-dotenv duckdb dbt-synapse dbt-duckdb"
      DBT_PROJECT_DIR: "/opt/airflow/dbt/customer360"
      AZURE_TENANT_ID: "${AZURE_TENANT_ID}"
      AZURE_CLIENT_ID: "${AZURE_CLIENT_ID}"
      AZURE_CLIENT_SECRET: "${AZURE_CLIENT_SECRET}"
      SYNAPSE_SERVER: "${SYNAPSE_SERVER}"
      SYNAPSE_DATABASE: "${SYNAPSE_DATABASE}"
    env_file:
      - ../.env
    volumes:
      - ../dags:/opt/airflow/dags
      - ../src:/opt/airflow/src
      - ../data:/opt/airflow/data
      - ../logs:/opt/airflow/logs
      - ../.env:/opt/airflow/.env
      - ../dbt:/opt/airflow/dbt
      - ../dbt/customer360/profiles.yml:/home/airflow/.dbt/profiles.yml:ro
      - /e/Study/Data Engineering/projects/customer360/log_content:/opt/airflow/log_content
      - /e/Study/Data Engineering/projects/customer360/log_search:/opt/airflow/log_search

    ports:
      - "8080:8080"
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    build:
      context: ..
      dockerfile: docker/Dockerfile.airflow
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW_UID: "50000"
      _PIP_ADDITIONAL_REQUIREMENTS: "pyspark==3.5.0 findspark psycopg2-binary azure-storage-blob python-dotenv duckdb dbt-synapse dbt-duckdb"
      DBT_PROJECT_DIR: "/opt/airflow/dbt/customer360"
      AZURE_TENANT_ID: "${AZURE_TENANT_ID}"
      AZURE_CLIENT_ID: "${AZURE_CLIENT_ID}"
      AZURE_CLIENT_SECRET: "${AZURE_CLIENT_SECRET}"
      SYNAPSE_SERVER: "${SYNAPSE_SERVER}"
      SYNAPSE_DATABASE: "${SYNAPSE_DATABASE}"
    env_file:
      - ../.env
    volumes:
      - ../dags:/opt/airflow/dags
      - ../src:/opt/airflow/src
      - ../data:/opt/airflow/data
      - ../logs:/opt/airflow/logs
      - ../.env:/opt/airflow/.env
      - ../dbt:/opt/airflow/dbt
      - ../dbt/customer360/profiles.yml:/home/airflow/.dbt/profiles.yml:ro
      - /e/Study/Data Engineering/projects/customer360/log_content:/opt/airflow/log_content
      - /e/Study/Data Engineering/projects/customer360/log_search:/opt/airflow/log_search

    command: scheduler

volumes:
  postgres_data: